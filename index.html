<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Yasmim 💖</title>

<style>
body {
    background: linear-gradient(135deg, #ffccd5, #ffe6f0);
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    text-align: center;
}

h1 {
    font-size: 5vw;
    color: #cc0066;
    margin: 10px 20px;
}

img {
    width: 60vw;
    max-width: 300px;
    border-radius: 20px;
    margin: 20px 0;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
}

button {
    padding: 12px 25px;
    font-size: 4vw;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    margin: 15px;
}

#sim {
    background-color: #ff4d88;
    color: white;
}

#nao {
    background-color: #999;
    color: white;
    position: absolute;
}

.heart {
    position: absolute;
    color: red;
    animation: float 4s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<h1>Yasmim, você me ama? 💖</h1>

<!-- Troque "foto.jpg" pelo nome da sua foto -->
<img src="foto.jpg" alt="Nós dois 💕">

<button id="sim" onclick="respostaSim()">Sim 💘</button>
<button id="nao">Não 😈</button>

<script>
// botão "Não" inicializado fora da foto
var botaoNao = document.getElementById("nao");
botaoNao.style.left = "10px";
botaoNao.style.top = "350px"; // ajuste conforme tamanho da foto

// função para mover botão "Não"
function fugir() {
    var largura = window.innerWidth - botaoNao.offsetWidth;
    var altura = window.innerHeight - botaoNao.offsetHeight - 150; // deixa margem para a foto

    botaoNao.style.left = Math.random() * largura + "px";
    botaoNao.style.top = 150 + Math.random() * (altura - 150) + "px"; 
}

// detectar toque no botão (celular)
botaoNao.addEventListener("touchstart", fugir);
// detectar mouseover (desktop)
botaoNao.addEventListener("mouseover", fugir);

// botão "Sim"
function respostaSim() {
    alert("Eu sabiaaaa 😍💞 Yasmim, você é o amor da minha vida!");
}

// corações animados
function criarCoracao() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 20 + "px";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 4000);
}
setInterval(criarCoracao, 500);
</script>

</body>
</html>
