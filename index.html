<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Yasmim 💖</title>

<style>
body {
    background: linear-gradient(135deg, #ffccd5, #ffe6f0);
    text-align: center;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

.container {
    margin-top: 50px;
}

h1 {
    font-size: 30px;
    color: #cc0066;
}

img {
    width: 250px;
    border-radius: 20px;
    margin: 20px 0;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
}

button {
    padding: 12px 25px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    margin: 15px;
}

#sim {
    background-color: #ff4d88;
    color: white;
}

#nao {
    background-color: #999;
    color: white;
    position: absolute;
}

.heart {
    position: absolute;
    color: red;
    animation: float 4s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">
    <h1>Yasmim, você me ama? 💖</h1>

    <!-- TROQUE "foto.jpg" PELO NOME DA SUA FOTO -->
    <img src="foto.jpg" alt="Nós dois 💕">

    <br>

    <button id="sim" onclick="respostaSim()">Sim 💘</button>
    <button id="nao" onmouseover="fugir()">Não 😈</button>
</div>

<script>
function respostaSim() {
    alert("Eu sabiaaaa 😍💞 Yasmim, você é o amor da minha vida!");
}

function fugir() {
    var botao = document.getElementById("nao");
    var largura = window.innerWidth - 100;
    var altura = window.innerHeight - 100;

    botao.style.left = Math.random() * largura + "px";
    botao.style.top = Math.random() * altura + "px";
}

// corações subindo
function criarCoracao() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 20 + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 4000);
}

setInterval(criarCoracao, 500);
</script>

</body>
</html>
