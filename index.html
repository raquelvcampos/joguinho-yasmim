<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Yasmim 💖</title>

<style>
body {
    background: linear-gradient(135deg, #ffccd5, #ffe6f0);
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh; /* ocupa toda a tela */
    overflow: hidden;
    text-align: center;
}

h1 {
    font-size: 5vw; /* ajusta à largura da tela */
    color: #cc0066;
    margin: 10px 20px;
}

img {
    width: 60vw; /* ocupa 60% da largura da tela */
    max-width: 300px; /* não fica gigante em tablet/PC */
    border-radius: 20px;
    margin: 20px 0;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
}

button {
    padding: 12px 25px;
    font-size: 4vw; /* tamanho ajusta ao celular */
    border-radius: 12px;
    border: none;
    cursor: pointer;
    margin: 15px;
}

#sim {
    background-color: #ff4d88;
    color: white;
}

#nao {
    background-color: #999;
    color: white;
    position: absolute;
}

.heart {
    position: absolute;
    color: red;
    animation: float 4s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<h1>Yasmim, você me ama? 💖</h1>

<!-- TROQUE "foto.jpg" PELO NOME DA SUA FOTO -->
<img src="foto.jpg" alt="Nós dois 💕">

<button id="sim" onclick="respostaSim()">Sim 💘</button>
<button id="nao" onmouseover="fugir()">Não 😈</button>

<script>
function respostaSim() {
    alert("Eu sabiaaaa 😍💞 Yasmim, você é o amor da minha vida!");
}

// Botão "Não" foge sem cobrir a foto
function fugir() {
    var botao = document.getElementById("nao");
    var largura = window.innerWidth - botao.offsetWidth;
    var altura = window.innerHeight - botao.offsetHeight - 150; // margem para foto

    botao.style.left = Math.random() * largura + "px";
    botao.style.top = 150 + Math.random() * (altura - 150) + "px"; 
}

// corações subindo
function criarCoracao() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 20 + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 4000);
}

setInterval(criarCoracao, 500);
</script>

</body>
</html>
